name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to (for example v0.1.0 or v0.1)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "TAG=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"
          fi

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          BIN_DIR="tony_${TAG}_${GOOS}_${GOARCH}"
          mkdir -p "$BIN_DIR"

          go build -o "$BIN_DIR/tony" .

          cp README.md LICENSE "$BIN_DIR/"
          tar -czf "dist/${BIN_DIR}.tar.gz" "$BIN_DIR"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  checksums:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        run: |
          find dist -name '*.tar.gz' -type f | sort | xargs shasum -a 256 > dist/tony_checksums.txt

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: dist/tony_checksums.txt

  upload:
    runs-on: ubuntu-latest
    needs: checksums

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Resolve tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "TAG=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"
          fi

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            dist/**/*.tar.gz
            dist/tony_checksums.txt
